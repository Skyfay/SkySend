services:
  skysend:
    image: skyfay/skysend:latest
    container_name: skysend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - BASE_URL=http://localhost:3000
      - DATA_DIR=/data
      - UPLOADS_DIR=/uploads
    #  - PUID=${PUID:-1001}
    #  - PGID=${PGID:-1001}
    volumes:
      - ./data:/data
      - ./uploads:/uploads
