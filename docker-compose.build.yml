services:
  skysend:
    build: .
    container_name: skysend-test
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATA_DIR=/data
      - UPLOADS_DIR=/uploads
    #  - PUID=${PUID:-1001}
    #  - PGID=${PGID:-1001}
    volumes:
      - ./test/data:/data
      - ./test/uploads:/uploads
