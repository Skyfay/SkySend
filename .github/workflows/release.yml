# ─── Release ─────────────────────────────────────────────────
# Build multi-arch Docker images and push to GHCR + Docker Hub.
# Triggered on version tags (e.g., v1.0.0, v1.1.0-beta).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  deployments: write

env:
  GHCR_IMAGE: ghcr.io/skyfay/skysend
  DOCKERHUB_IMAGE: skyfay/skysend

jobs:
  # ── Validate first ──────────────────────────────────────────
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  # ── Build per-arch images ───────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.suffix }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.GHCR_IMAGE }}:${{ github.ref_name }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=build-${{ matrix.suffix }}
          cache-to: type=gha,scope=build-${{ matrix.suffix }},mode=max

  # ── Build verification ──────────────────────────────────────
  # Starts the built amd64 image and verifies the app boots
  # successfully as the non-root runtime user.
  build-verification:
    name: Build Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container
        run: |
          docker run -d --name smoke \
            -p 3000:3000 \
            -e BASE_URL=http://localhost:3000 \
            "${{ env.GHCR_IMAGE }}:${{ github.ref_name }}-amd64"

      - name: Wait for healthy
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to start within 30s"
          echo "--- Container logs ---"
          docker logs smoke
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f smoke || true

  # ── Create multi-arch manifests ─────────────────────────────
  manifest:
    name: Create Manifests
    runs-on: ubuntu-latest
    needs: [build-verification, cli-assets]
    environment:
      name: ${{ contains(github.ref_name, '-dev') && 'dev' || contains(github.ref_name, '-beta') && 'beta' || 'production' }}
      url: https://github.com/skyfay/skysend/pkgs/container/skysend
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-dev ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-beta ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            MAJOR=$(echo "$TAG" | sed -nE 's/^(v[0-9]+)\..*$/\1/p')
            echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GHCR manifests
        run: |
          TAG="${{ steps.tags.outputs.version }}"
          SRC_AMD64="${{ env.GHCR_IMAGE }}:${TAG}-amd64"
          SRC_ARM64="${{ env.GHCR_IMAGE }}:${TAG}-arm64"

          # Version tag
          docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:${TAG}" "$SRC_AMD64" "$SRC_ARM64"

          # Channel tags
          CHANNEL="${{ steps.tags.outputs.channel }}"
          if [ "$CHANNEL" = "dev" ]; then
            docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:dev" "$SRC_AMD64" "$SRC_ARM64"
          elif [ "$CHANNEL" = "beta" ]; then
            docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:beta" "$SRC_AMD64" "$SRC_ARM64"
          else
            docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:latest" "$SRC_AMD64" "$SRC_ARM64"
            MAJOR="${{ steps.tags.outputs.major }}"
            if [ -n "$MAJOR" ] && [ "$MAJOR" != "v0" ]; then
              docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:${MAJOR}" "$SRC_AMD64" "$SRC_ARM64"
            fi
          fi

      - name: Create Docker Hub manifests
        if: vars.DOCKERHUB_USERNAME != ''
        run: |
          TAG="${{ steps.tags.outputs.version }}"
          SRC_AMD64="${{ env.GHCR_IMAGE }}:${TAG}-amd64"
          SRC_ARM64="${{ env.GHCR_IMAGE }}:${TAG}-arm64"

          # Version tag
          docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:${TAG}" "$SRC_AMD64" "$SRC_ARM64"

          # Channel tags
          CHANNEL="${{ steps.tags.outputs.channel }}"
          if [ "$CHANNEL" = "dev" ]; then
            docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:dev" "$SRC_AMD64" "$SRC_ARM64"
          elif [ "$CHANNEL" = "beta" ]; then
            docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:beta" "$SRC_AMD64" "$SRC_ARM64"
          else
            docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:latest" "$SRC_AMD64" "$SRC_ARM64"
            MAJOR="${{ steps.tags.outputs.major }}"
            if [ -n "$MAJOR" ] && [ "$MAJOR" != "v0" ]; then
              docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:${MAJOR}" "$SRC_AMD64" "$SRC_ARM64"
            fi
          fi

  # ── Push README to Docker Hub ───────────────────────────────
  readme:
    name: Push README to Docker Hub
    runs-on: ubuntu-latest
    needs: manifest
    if: vars.DOCKERHUB_USERNAME != ''
    steps:
      - uses: actions/checkout@v4

      - name: Push README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: skyfay/skysend
          readme-filepath: README.md

  # ── Build CLI binaries ───────────────────────────────────────
  cli-binaries:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            bun-target: bun-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun-target: bun-linux-arm64
          - target: macos-x64
            runner: macos-latest
            bun-target: bun-darwin-x64
          - target: macos-arm64
            runner: macos-latest
            bun-target: bun-darwin-arm64
          - target: windows-x64
            runner: windows-latest
            bun-target: bun-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @skysend/crypto build && pnpm --filter @skysend/client build

      - name: Compile binary
        run: pnpm --filter @skysend/client build:${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: apps/client/dist/skysend-${{ matrix.target }}*
          retention-days: 1

  # ── Prepare CLI release assets ──────────────────────────────
  cli-assets:
    name: Prepare CLI Assets
    runs-on: ubuntu-latest
    needs: cli-binaries
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum skysend-* > checksums.txt && cat checksums.txt

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-release-assets
          path: |
            skysend-*
            checksums.txt
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [manifest, cli-assets]
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download CLI assets
        uses: actions/download-artifact@v4
        with:
          name: cli-release-assets
          path: release-assets

      - name: Extract Release Notes from Changelog
        run: |
          TAG="${{ github.ref_name }}"
          echo "Extracting release notes for $TAG..."

          awk -v tag="^## $TAG" '
            $0 ~ tag {flag=1; sub(/^## v[^ ]+ - /, "## "); print; next}
            /^## v[0-9]/ {if(flag) exit}
            flag && /^\*Released:/ {next}
            flag {print}
          ' docs/changelog.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No release notes found for $TAG in docs/changelog.md"
            exit 1
          fi

          echo "Found release notes:"
          cat release_notes.md

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release-assets/*
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-dev') }}
