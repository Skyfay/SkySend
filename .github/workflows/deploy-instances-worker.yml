# ─── Deploy Instances Worker ──────────────────────────────────
# Deploys the instances Cloudflare Worker when its code changes.

name: Deploy Instances Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/instances/**"
      - ".github/workflows/deploy-instances-worker.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @skysend/instances-worker

      - name: Deploy Worker
        working-directory: workers/instances
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
