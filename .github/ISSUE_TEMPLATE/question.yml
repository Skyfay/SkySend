name: Question / Support
description: Ask a question about setup, configuration, or usage
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about SkySend? Check the [documentation](https://docs.skysend.app) first - your answer might already be there.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SkySend Version
      description: Which version are you running? (optional)
      placeholder: e.g. v2.5.4

  - type: dropdown
    id: instance_type
    attributes:
      label: Instance Type
      description: Are you using a self-hosted instance or a public instance (e.g. ch.skysend.app)?
      options:
        - Self-hosted instance
        - Public instance (ch.skysend.app or other community instance)
        - Not applicable

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant details, screenshots, or configuration snippets.
